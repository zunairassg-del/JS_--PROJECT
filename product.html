<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product List</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
}

.glass{
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
}
</style>

</head>

<body class="text-white p-8">

<div class="max-w-7xl mx-auto">

<div class="flex justify-between items-center mb-8">
<h1 class="text-3xl font-bold">📦 Product Inventory List</h1>

<a href="product-entry.html"
class="bg-blue-600 px-5 py-2 rounded-xl hover:bg-blue-700 transition shadow-lg">
+ Add Product
</a>
</div>


<div class="glass p-8 rounded-3xl shadow-2xl overflow-x-auto">

<table class="w-full text-sm">

<thead>
<tr class="border-b border-white/20">

<th class="p-3">Picture</th>
<th class="p-3">ID</th>
<th class="p-3">Product Name</th>
<th class="p-3">Category</th>
<th class="p-3">Purchase</th>
<th class="p-3">Retail</th>
<th class="p-3">Wholesale</th>
<th class="p-3">Stock</th>
<th class="p-3">Expiry</th>
<th class="p-3">Status</th>
<th class="p-3">Action</th>

</tr>
</thead>

<tbody>

<tr class="border-b border-white/10 hover:bg-white/10 transition">

<td class="p-3">
<img src="https://via.placeholder.com/60"
class="w-14 h-14 rounded-lg object-cover">
</td>

<td class="p-3">101</td>
<td class="p-3">Milk</td>
<td class="p-3">Dairy</td>
<td class="p-3">120</td>
<td class="p-3">140</td>
<td class="p-3">130</td>
<td class="p-3">25</td>
<td class="p-3">2026-03-01</td>

<td class="p-3">
<span class="bg-green-500/30 px-3 py-1 rounded-full text-xs">
In Stock
</span>
</td>

<td class="p-3 space-x-2">
<button class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded-lg transition">
Edit
</button>
<button class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded-lg transition">
Delete
</button>
</td>

</tr>

<tr class="border-b border-white/10 hover:bg-white/10 transition">

<td class="p-3">
<img src="https://via.placeholder.com/60"
class="w-14 h-14 rounded-lg object-cover">
</td>

<td class="p-3">102</td>
<td class="p-3">Rice</td>
<td class="p-3">Grocery</td>
<td class="p-3">250</td>
<td class="p-3">280</td>
<td class="p-3">270</td>
<td class="p-3">5</td>
<td class="p-3">2026-06-15</td>

<td class="p-3">
<span class="bg-yellow-500/30 px-3 py-1 rounded-full text-xs">
Low Stock
</span>
</td>

<td class="p-3 space-x-2">
<button class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded-lg transition">
Edit
</button>
<button class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded-lg transition">
Delete
</button>
</td>

</tr>

</tbody>
</table>

</div>
</div>

</body>
</html>
