<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Entry</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;

 
  background: linear-gradient(135deg, #020202, #050510, #0a0f1f, #0d1b2a);
}

.glass{
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
}

</style>

</head>

<body class="text-white">

<div class="max-w-4xl mx-auto min-h-screen flex items-center justify-center px-6 py-16">

<div class="glass w-full p-10 rounded-3xl shadow-2xl">

<h2 class="text-3xl font-bold text-center mb-10 text-blue-400">
📦 Product Entry Form
</h2>

<form class="grid md:grid-cols-2 gap-6">

<div>
<label class="font-semibold">Product ID</label>
<input type="text"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-blue-500 text-white">
</div>

<div>
<label class="font-semibold">Product Name</label>
<input type="text"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-indigo-500 text-white">
</div>

<div>
<label class="font-semibold">Category</label>
<input type="text"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-blue-500 text-white">
</div>

<div>
<label class="font-semibold">Stock Quantity</label>
<input type="number"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-yellow-500 text-white">
</div>

<div>
<label class="font-semibold">Purchase Price</label>
<input type="number"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-yellow-500 text-white">
</div>

<div>
<label class="font-semibold">Retail Price</label>
<input type="number"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-green-500 text-white">
</div>

<div>
<label class="font-semibold">Wholesale Price</label>
<input type="number"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-blue-500 text-white">
</div>

<div>
<label class="font-semibold">Expiry Date</label>
<input type="date"
class="w-full mt-2 p-3 rounded-xl bg-white/5 outline-none focus:ring-2 focus:ring-red-500 text-white">
</div>

<div class="md:col-span-2 flex items-center gap-6">

<div class="w-24 h-24 rounded-xl border-2 border-dashed border-white/20
flex items-center justify-center bg-white/5 overflow-hidden">

<p class="text-xs text-center text-white/60 p-2">
Upload Product Photo
</p>

</div>

<input type="file" accept="image/*"
class="flex-1 p-2 rounded-xl bg-white/5 text-white text-sm">
</div>


<div class="md:col-span-2 flex gap-5 pt-6">

<button type="submit"
class="flex-1 py-3 rounded-xl font-semibold text-white
bg-blue-600 hover:bg-blue-700 transition shadow-lg">
💾 Save Product
</button>

<button type="reset"
class="flex-1 py-3 rounded-xl font-semibold text-white
bg-gray-700 hover:bg-gray-800 transition shadow-lg">
🗑️ Discard
</button>

</div>

</form>

</div>
</div>

</body>
</html>
