
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Purchase Entry</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;

  background: linear-gradient(-45deg,#667eea,#764ba2,#ff758c,#42e695);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.glass{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.25);
}

</style>

</head>

<body class="text-white">

<div class="max-w-4xl mx-auto min-h-screen flex items-center justify-center px-6 py-16">

<div class="glass w-full p-10 rounded-3xl shadow-2xl border border-white/30">

<h2 class="text-3xl font-bold text-center mb-10">
🧾 Purchase Entry Form
</h2>

<form class="grid md:grid-cols-2 gap-6">

<div>
<label class="font-semibold">Purchase ID</label>
<input type="text"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-blue-300">
</div>

<div>
<label class="font-semibold">Date</label>
<input type="date"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-green-300">
</div>

<div>
<label class="font-semibold">Project</label>
<input type="text"
placeholder="Project name"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-purple-300">
</div>

<div>
<label class="font-semibold">Quantity</label>
<input type="number"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-yellow-300">
</div>

<div>
<label class="font-semibold">Bill Amount</label>
<input type="number" placeholder="Total bill amount"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-red-300">
</div>

<div>
<label class="font-semibold">Retail Price</label>
<input type="number" placeholder="Retail price"
class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-green-300">
</div>

<div>
<label class="font-semibold">Status</label>
<select class="w-full mt-2 p-3 rounded-xl bg-white/40 outline-none focus:ring-2 focus:ring-purple-300">
<option>Pending</option>
<option>Completed</option>
<option>Cancelled</option>
</select>
</div>

<!-- Buttons -->
<div class="md:col-span-2 flex gap-5 pt-6">

<button type="submit"
class="flex-1 py-3 rounded-xl font-semibold text-white
bg-gradient-to-r from-green-400 to-green-600
hover:scale-105 transition shadow-lg">
💾 Save Purchase
</button>

<button type="reset"
class="flex-1 py-3 rounded-xl font-semibold text-white
bg-gradient-to-r from-gray-400 to-gray-600
hover:scale-105 transition shadow-lg">
🗑️ Discard
</button>

</div>

</form>

</div>
</div>

</body>
</html>
