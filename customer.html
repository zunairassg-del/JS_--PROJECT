<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Management System</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins', sans-serif;
  background: linear-gradient(-45deg,#667eea,#764ba2,#ff758c,#42e695);
  background-size:400% 400%;
  animation: gradientBG 12s ease infinite;
  min-height:100vh;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
</style>

</head>

<body class="text-white">

<div class="text-center py-6">
<h1 class="text-3xl font-bold tracking-wide drop-shadow-lg">
CUSTOMER MANAGEMENT SYSTEM
</h1>
</div>


<div class="grid grid-cols-1 lg:grid-cols-3 gap-6 px-8 pb-10">


<div class="bg-white/20 backdrop-blur-lg rounded-2xl p-6 shadow-lg">
<h2 class="text-xl font-semibold mb-4">Customer List</h2>

<div class="space-y-3">

<div class="p-3 bg-white/30 rounded-lg hover:bg-white/40 transition">
<p class="font-semibold">ID: C001</p>
<p class="text-sm">Name: Ali Khan</p>
<p class="text-sm">Phone: 0300-1234567</p>
</div>

<div class="p-3 bg-white/30 rounded-lg hover:bg-white/40 transition">
<p class="font-semibold">ID: C002</p>
<p class="text-sm">Name: Ahmed</p>
<p class="text-sm">Phone: 0312-9876543</p>
</div>

</div>
</div>


<div class="lg:col-span-2
bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600
backdrop-blur-xl rounded-2xl p-8 shadow-2xl
border border-white/30">

<h2 class="text-2xl font-bold text-center mb-6">
Customer Registration
</h2>

<form class="space-y-5">

<div>
<label class="block mb-1 font-semibold">Customer ID</label>
<input type="text" placeholder="Enter customer ID"
class="w-full p-3 rounded-lg bg-white/30 placeholder-white/70 outline-none focus:ring-2 focus:ring-pink-300">
</div>

<div>
<label class="block mb-1 font-semibold">Customer Name</label>
<input type="text" placeholder="Enter customer name"
class="w-full p-3 rounded-lg bg-white/30 placeholder-white/70 outline-none focus:ring-2 focus:ring-purple-300">
</div>

<div>
<label class="block mb-1 font-semibold">Phone Number</label>
<input type="tel" placeholder="Enter phone number"
class="w-full p-3 rounded-lg bg-white/30 placeholder-white/70 outline-none focus:ring-2 focus:ring-blue-300">
</div>

<button type="submit"
class="w-full bg-white text-purple-700 hover:bg-gray-100 transition p-3 rounded-lg font-semibold shadow-lg">
Save Customer
</button>

</form>
</div>

</div>

</body>
</html>
